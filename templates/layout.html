<!DOCTYPE html>
    <html data-bs-theme="dark">
        <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

            <!-- https://getbootstrap.com/docs/5.3/ -->
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
            <link rel="stylesheet" href="/static/style.css">

            <!-- https://favicon.io/emoji-favicons/check-box-with-check -->
            <link href="/static/images/favicon.ico" rel="icon">

            <title>Study Tracker: {% block title %}{% endblock %}</title>
        </head>
    <body>
        {% block nav %}
        <!-- SOURCE: Navbar example from bootstrap docs (https://getbootstrap.com/docs/5.3/components/navbar/) -->
            <nav class="border navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">Study Tracker</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                            <a class="nav-link" href="/">Home</a>
                            </li>
                            <li class="nav-item">
                            <a class="nav-link" href="/dashboard">Dashboard</a>
                            </li>
                            <li class="nav-item">
                            <a class="nav-link" href="/timer">Timer</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        {% endblock %}
        <main>
            {% block main %}
            {% endblock %}
        </main>
        {% block footer %}
            <footer class="main-footer">
                <p>A site by Xperian.</p>
            </footer>
        {% endblock %}
    </body>
</html>
